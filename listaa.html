
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista Eventi Daddy</title>

<style>

body {
font-family:Arial;
margin:20px;
background:#0f1115;
color:white;
}

input {
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:8px;
border:none;
background:#1a1f2e;
color:white;
}

h4 {
cursor:pointer;
padding:10px;
background:#151a28;
border-radius:8px;
}

.event {
margin-bottom:12px;
padding:10px;
background:#111623;
border-radius:10px;
}

.channels {
display:none;
margin-top:8px;
}

button {
margin:6px;
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#16a34a;
color:white;
}

#playerContainer {
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
height:60%;
background:black;
z-index:9999;
display:none;
}

#iframePlayer {
width:100%;
height:100%;
border:none;
}

.ctrl {
background:#1f2937;
margin:4px;
}

</style>

</head>

<body>

<h1>Eventi Soccer</h1>

<input type="text" id="searchInput" placeholder="Cerca evento...">

<script>

document.addEventListener("DOMContentLoaded",function(){

var input=document.getElementById("searchInput");

input.addEventListener("input",function(){

var filter=input.value.toLowerCase();

var events=document.querySelectorAll(".event");

events.forEach(function(e){

var txt=e.textContent.toLowerCase();

if(txt.includes(filter)){

e.style.display="";

}else{

e.style.display="none";

}

});

});

});

function playInIframe(url){

var c=document.getElementById("playerContainer");

var i=document.getElementById("iframePlayer");

i.src=url;

c.style.display="block";

}

function togglePlayer(){

var c=document.getElementById("playerContainer");

c.style.display="none";

document.getElementById("iframePlayer").src="";

}

function toggleFullscreen(){

var iframe=document.getElementById("iframePlayer");

if(iframe.requestFullscreen){iframe.requestFullscreen();}

}

function toggleChannels(id){

var e=document.getElementById(id);

if(e.style.display==="none"||!e.style.display){

e.style.display="block";

}else{

e.style.display="none";

}

}

</script>


<div id="playerContainer">

<button class="ctrl" onclick="toggleFullscreen()">Fullscreen</button>

<button class="ctrl" onclick="togglePlayer()">Chiudi</button>

<iframe id="iframePlayer"></iframe>

</div>

</body>
</html>
