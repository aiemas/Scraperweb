
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista Eventi Daddy</title>

<style>

body {
font-family:Arial;
margin:20px;
background:#0f1115;
color:white;
}

input {
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:8px;
border:none;
background:#1a1f2e;
color:white;
}

h4 {
cursor:pointer;
padding:10px;
background:#151a28;
border-radius:8px;
}

.event {
margin-bottom:12px;
padding:10px;
background:#111623;
border-radius:10px;
}

.channels {
display:none;
margin-top:8px;
}

button {
margin:6px;
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#16a34a;
color:white;
}

#playerContainer {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

#iframePlayer {
width:90%;
height:80%;
border:none;
border-radius:10px;
}

.ctrl {
background:#1f2937;
margin:5px;
padding:8px 12px;
}

</style>

</head>

<body>

<h1>Eventi Soccer</h1>

<input type="text" id="searchInput" placeholder="Cerca evento...">

<script>

document.addEventListener("DOMContentLoaded",function(){

var input=document.getElementById("searchInput");

input.addEventListener("input",function(){

var filter=input.value.toLowerCase();

var events=document.querySelectorAll(".event");

events.forEach(function(e){

var txt=e.textContent.toLowerCase();

if(txt.includes(filter)){

e.style.display="";

}else{

e.style.display="none";

}

});

});

});

function playInIframe(url){

var c=document.getElementById("playerContainer");
var i=document.getElementById("iframePlayer");

i.src="";
setTimeout(function(){
    i.src=url;
},100);

c.style.display="flex";

}

function togglePlayer(){
var c=document.getElementById("playerContainer");
c.style.display="none";
document.getElementById("iframePlayer").src="";
}

function toggleFullscreen(){
var iframe=document.getElementById("iframePlayer");
if(iframe.requestFullscreen){
    iframe.requestFullscreen();
}
}

function toggleChannels(id){

var e=document.getElementById(id);

if(e.style.display==="none"||!e.style.display){
    e.style.display="block";
}else{
    e.style.display="none";
}

}

</script>


<div id="playerContainer">

<div>
<button class="ctrl" onclick="toggleFullscreen()">Fullscreen</button>
<button class="ctrl" onclick="togglePlayer()">Chiudi</button>
</div>

<iframe id="iframePlayer"></iframe>

</div>

</body>
</html>
