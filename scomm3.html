<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Live Score Explorer</title>

<style>

body{
    margin:0;
    background:#ececec;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
    font-size:34px;
    font-weight:bold;
}

#barra{
    background:white;
    padding:15px;
    position:sticky;
    top:0;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

#ricerca{
    width:100%;
    font-size:18px;
    padding:10px;
    box-sizing:border-box;
}

#contenitore{

    display:grid;
    grid-template-columns:45% 55%;
    height:calc(100vh - 120px);

}

#lista{

    overflow:auto;
    padding:20px;

}

#dettagli{

    overflow:auto;
    padding:20px;
    background:white;
    border-left:2px solid #ddd;

}

.campionato{

    background:#1b5e20;
    color:white;
    padding:10px;
    margin-top:25px;
    font-size:22px;
    border-radius:6px;

}

.partita{

    background:white;
    margin:8px 0;
    padding:12px;
    cursor:pointer;
    border-radius:6px;
    transition:.2s;

}

.partita:hover{

    background:#d9edf7;

}

.nome{

    font-weight:bold;
    font-size:18px;

}

.stato{

    color:#777;
    margin-top:4px;

}

table{

    border-collapse:collapse;
    width:100%;

}

td{

    border-bottom:1px solid #ddd;
    padding:8px;

}

pre{

    white-space:pre-wrap;
    word-break:break-word;
    background:#f5f5f5;
    padding:10px;

}

</style>

</head>

<body>

<header>

LIVE SCORE EXPLORER

</header>

<div id="barra">

<input
id="ricerca"
placeholder="Cerca squadra o campionato..."
>

</div>

<div id="contenitore">

<div id="lista"></div>

<div id="dettagli">

<h2>Dettagli partita</h2>

Seleziona una partita.

</div>

</div>

<script>

let tuttePartite=[];

fetch("9lug.json")

.then(r=>r.json())

.then(data=>{

console.log(data);

carica(data);

});

function carica(data){

const lista=document.getElementById("lista");

lista.innerHTML="";

tuttePartite=[];

data.Sctns.forEach(sezione=>{

let nomeCampionato="";
let eventi=[];

if(sezione.Cp){

nomeCampionato=sezione.Cp.CompN;

eventi=sezione.Cp.Evs||[];

}

else if(sezione.Ts){

nomeCampionato=sezione.Ts.Cnm+" - "+sezione.Ts.Snm;

eventi=sezione.Ts.Evs||[];

}

if(eventi.length==0)
return;

const titolo=document.createElement("div");

titolo.className="campionato";

titolo.innerHTML=nomeCampionato;

lista.appendChild(titolo);

eventi.forEach(partita=>{

const casa=partita.T1?.[0]?.Nm||"";

const ospite=partita.T2?.[0]?.Nm||"";

const stato=partita.Eps||"";

const div=document.createElement("div");

div.className="partita";

div.dataset.testo=(nomeCampionato+" "+casa+" "+ospite).toLowerCase();

div.innerHTML=`

<div class="nome">

${casa} vs ${ospite}

</div>

<div class="stato">

${stato}

</div>

`;

div.onclick=()=>mostra(partita,nomeCampionato);

lista.appendChild(div);

tuttePartite.push(div);

});

});

}

function mostra(p,campionato){

const casa=p.T1?.[0]?.Nm||"";

const ospite=p.T2?.[0]?.Nm||"";

const tv=(p.Md?.["112"]||[])

.map(x=>x.Eid)

.join("<br>");

const streaming=(p.Md?.["29"]||[])

.map(x=>x.Shls)

.join("<br>");

document.getElementById("dettagli").innerHTML=`

<h2>${casa} vs ${ospite}</h2>

<table>

<tr>

<td><b>Campionato</b></td>

<td>${campionato}</td>

</tr>

<tr>

<td><b>Stato</b></td>

<td>${p.Eps||""}</td>

</tr>

<tr>

<td><b>Turno</b></td>

<td>${p.ErnInf||p.Snm||""}</td>

</tr>

<tr>

<td><b>ID</b></td>

<td>${p.Eid}</td>

</tr>

<tr>

<td><b>TV</b></td>

<td>${tv||"-"}</td>

</tr>

<tr>

<td><b>Streaming</b></td>

<td>${streaming||"-"}</td>

</tr>

</table>

<h3>JSON completo</h3>

<pre>${JSON.stringify(p,null,2)}</pre>

`;

}

document.getElementById("ricerca")

.addEventListener("keyup",function(){

const testo=this.value.toLowerCase();

tuttePartite.forEach(p=>{

p.style.display=p.dataset.testo.includes(testo)

?"block"

:"none";

});

});

</script>

</body>

</html>
